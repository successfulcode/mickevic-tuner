<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#151528"/>
      <stop offset="100%" stop-color="#090910"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Outer ambient ring -->
  <circle cx="256" cy="316" r="162" fill="none"
          stroke="rgba(0,255,136,0.05)" stroke-width="32"/>

  <!-- Arc track (center 256,316 · radius 148 · 200°→340°) -->
  <path d="M 107 265 A 148 148 0 0 1 405 265"
        fill="none" stroke="#1a1a2a" stroke-width="9" stroke-linecap="round"/>

  <!-- In-tune zone (±7° around 270°) -->
  <path d="M 238 170 A 148 148 0 0 1 274 170"
        fill="none" stroke="rgba(0,255,136,0.3)" stroke-width="9" stroke-linecap="round"/>

  <!-- Tick marks -->
  <!-- Center (0¢) -->
  <line x1="256" y1="182" x2="256" y2="158"
        stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
  <!-- -50¢ left -->
  <line x1="120" y1="259" x2="111" y2="247"
        stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-linecap="round"/>
  <!-- +50¢ right -->
  <line x1="392" y1="259" x2="401" y2="247"
        stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-linecap="round"/>

  <!-- Needle glow (wide pass) -->
  <line x1="256" y1="316" x2="256" y2="176"
        stroke="rgba(0,255,136,0.12)" stroke-width="22" stroke-linecap="round"/>

  <!-- Needle (sharp pass) -->
  <line x1="256" y1="316" x2="256" y2="176"
        stroke="#00ff88" stroke-width="4.5" stroke-linecap="round" filter="url(#soft)"/>

  <!-- Tip dot glow -->
  <circle cx="256" cy="176" r="16" fill="rgba(0,255,136,0.18)"/>

  <!-- Tip dot -->
  <circle cx="256" cy="176" r="8" fill="#00ff88" filter="url(#glow)"/>

  <!-- Pivot outer -->
  <circle cx="256" cy="316" r="13" fill="#141420"/>
  <!-- Pivot inner -->
  <circle cx="256" cy="316" r="6" fill="#444466"/>

  <!-- ♭ label -->
  <text x="90" y="286" font-family="Georgia, serif" font-size="26"
        fill="rgba(255,255,255,0.18)" text-anchor="middle">♭</text>
  <!-- ♯ label -->
  <text x="422" y="286" font-family="Georgia, serif" font-size="26"
        fill="rgba(255,255,255,0.18)" text-anchor="middle">♯</text>
</svg>
